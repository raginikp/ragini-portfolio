{% extends "base.html" %}

{% block content %}
<div class="container my-5 py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8 text-center">
            <div class="error-template">
                <h1 class="display-1 text-danger">500</h1>
                <h2 class="display-4">Oops! Something went wrong</h2>
                <div class="error-details mt-4">
                    <p class="lead">We're experiencing some technical difficulties. Please try again later.</p>
                </div>
                <div class="error-actions mt-5">
                    <a href="{{ url_for('home') }}" class="btn btn-primary btn-lg me-3">
                        <i class="fas fa-home me-2"></i>Take Me Home
                    </a>
                    <a href="mailto:{{ data.email }}" class="btn btn-outline-primary btn-lg">
                        <i class="fas fa-envelope me-2"></i>Contact Support
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.error-template {
    padding: 40px 15px;
    text-align: center;
}
.error-actions {
    margin-top: 30px;
    margin-bottom: 15px;
}
</style>
{% endblock %}
